# =============================================================================
# LLM-PROXY GITLAB CI/CD PIPELINE
# =============================================================================
# Stages: lint, test, security, build, docker, deploy
# =============================================================================

stages:
  - lint
  - test
  - security
  - build
  - docker
  - deploy

# =============================================================================
# VARIABLES
# =============================================================================

variables:
  # Go configuration
  GO_VERSION: "1.21"
  CGO_ENABLED: "0"
  GOOS: "linux"
  GOARCH: "amd64"
  
  # Docker configuration
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  
  # Docker image names (using GitLab Container Registry)
  BACKEND_IMAGE: "${CI_REGISTRY_IMAGE}/backend"
  ADMIN_UI_IMAGE: "${CI_REGISTRY_IMAGE}/admin-ui"
  
  # Cache configuration
  GOPATH: "${CI_PROJECT_DIR}/.go"
  GOCACHE: "${CI_PROJECT_DIR}/.cache/go-build"

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================

.go-cache:
  cache:
    key: "${CI_COMMIT_REF_SLUG}-go"
    paths:
      - .go/pkg/mod/
      - .cache/go-build/

.node-cache:
  cache:
    key: "${CI_COMMIT_REF_SLUG}-node"
    paths:
      - admin-ui/node_modules/

# =============================================================================
# STAGE 1: LINT
# =============================================================================

lint:backend:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - apk add --no-cache git make
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  script:
    - echo "Running Go linter..."
    - golangci-lint run --timeout=5m ./...
  only:
    - merge_requests
    - main
    - develop

lint:admin-ui:
  stage: lint
  image: node:22-alpine
  extends: .node-cache
  before_script:
    - cd admin-ui
    - npm ci
  script:
    - echo "Running JavaScript/Svelte linter..."
    - npm run lint || true  # Continue even if no lint script
  only:
    - merge_requests
    - main
    - develop

format:check:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  script:
    - echo "Checking Go code formatting..."
    - gofmt -l .
    - test -z "$(gofmt -l .)" || (echo "Code is not formatted. Run 'make fmt'" && exit 1)
  only:
    - merge_requests
    - main

# =============================================================================
# STAGE 2: TEST
# =============================================================================

test:unit:
  stage: test
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  services:
    - postgres:14-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: llm_proxy_test
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: llm_proxy_test
    DB_USER: test_user
    DB_PASSWORD: test_password
    REDIS_HOST: redis
    REDIS_PORT: "6379"
  before_script:
    - apk add --no-cache git gcc musl-dev postgresql-client
    - go mod download
  script:
    - echo "Running unit tests..."
    - go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
    - go tool cover -func=coverage.txt
  coverage: '/total:.*?(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.txt
    paths:
      - coverage.txt
      - coverage.html
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

test:integration:
  stage: test
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  services:
    - postgres:14-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: llm_proxy_test
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: llm_proxy_test
    DB_USER: test_user
    DB_PASSWORD: test_password
    REDIS_HOST: redis
    REDIS_PORT: "6379"
  before_script:
    - apk add --no-cache git gcc musl-dev postgresql-client
    - go mod download
  script:
    - echo "Running integration tests..."
    - go test -v -tags=integration ./tests/integration/... || true
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

test:admin-ui:
  stage: test
  image: node:22-alpine
  extends: .node-cache
  before_script:
    - cd admin-ui
    - npm ci
  script:
    - echo "Running Admin UI tests..."
    - npm test || true  # Continue even if no tests
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

# =============================================================================
# STAGE 3: SECURITY
# =============================================================================

security:go-dependencies:
  stage: security
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - apk add --no-cache git
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - echo "Checking for known vulnerabilities in Go dependencies..."
    - govulncheck ./...
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

security:npm-audit:
  stage: security
  image: node:22-alpine
  extends: .node-cache
  before_script:
    - cd admin-ui
    - npm ci
  script:
    - echo "Running npm security audit..."
    - npm audit --audit-level=moderate || true
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

security:secrets-scan:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git grep
  script:
    - echo "Scanning for potential secrets..."
    - |
      # Check for common secret patterns
      if grep -rE "password.*=.*['\"].*['\"]" --exclude-dir=.git --exclude="*.md" .; then
        echo "⚠️  Warning: Found potential hardcoded passwords"
      fi
    - |
      if grep -rE "api[_-]?key.*=.*['\"].*['\"]" --exclude-dir=.git --exclude="*.md" --exclude=".env.production.example" .; then
        echo "⚠️  Warning: Found potential hardcoded API keys"
      fi
    - echo "Secret scan complete"
  allow_failure: true
  only:
    - merge_requests
    - main

# =============================================================================
# STAGE 4: BUILD
# =============================================================================

build:backend:
  stage: build
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  before_script:
    - apk add --no-cache git gcc musl-dev
  script:
    - echo "Building backend binary..."
    - mkdir -p bin
    - |
      CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
        -ldflags="-w -s \
        -X main.Version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}} \
        -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') \
        -X main.GitCommit=${CI_COMMIT_SHORT_SHA}" \
        -o bin/llm-proxy \
        ./cmd/server/main.go
    - chmod +x bin/llm-proxy
    - ls -lh bin/llm-proxy
  artifacts:
    paths:
      - bin/llm-proxy
    expire_in: 1 day
  only:
    - merge_requests
    - main
    - develop
    - tags

build:admin-ui:
  stage: build
  image: node:22-alpine
  extends: .node-cache
  before_script:
    - cd admin-ui
    - npm ci
  script:
    - echo "Building Admin UI..."
    - npm run build
    - ls -lah dist/
  artifacts:
    paths:
      - admin-ui/dist/
    expire_in: 1 day
  only:
    - merge_requests
    - main
    - develop
    - tags

# =============================================================================
# STAGE 5: DOCKER
# =============================================================================

.docker-login:
  before_script:
    - echo "Logging into GitLab Container Registry..."
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"

docker:backend:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  extends: .docker-login
  script:
    - echo "Building backend Docker image..."
    - |
      docker build \
        -f deployments/docker/Dockerfile \
        -t "${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" \
        -t "${BACKEND_IMAGE}:${CI_COMMIT_REF_SLUG}" \
        --build-arg VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}" \
        --build-arg BUILD_TIME="$(date -u '+%Y-%m-%d_%H:%M:%S')" \
        --build-arg GIT_COMMIT="${CI_COMMIT_SHORT_SHA}" \
        .
    - docker push "${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${BACKEND_IMAGE}:${CI_COMMIT_REF_SLUG}"
    - |
      if [ "${CI_COMMIT_REF_NAME}" = "main" ]; then
        docker tag "${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${BACKEND_IMAGE}:latest"
        docker push "${BACKEND_IMAGE}:latest"
      fi
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        docker tag "${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${BACKEND_IMAGE}:${CI_COMMIT_TAG}"
        docker push "${BACKEND_IMAGE}:${CI_COMMIT_TAG}"
      fi
  only:
    - main
    - develop
    - tags

docker:admin-ui:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  extends: .docker-login
  script:
    - echo "Building Admin UI Docker image..."
    - |
      docker build \
        -f admin-ui/Dockerfile \
        -t "${ADMIN_UI_IMAGE}:${CI_COMMIT_SHORT_SHA}" \
        -t "${ADMIN_UI_IMAGE}:${CI_COMMIT_REF_SLUG}" \
        admin-ui/
    - docker push "${ADMIN_UI_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${ADMIN_UI_IMAGE}:${CI_COMMIT_REF_SLUG}"
    - |
      if [ "${CI_COMMIT_REF_NAME}" = "main" ]; then
        docker tag "${ADMIN_UI_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${ADMIN_UI_IMAGE}:latest"
        docker push "${ADMIN_UI_IMAGE}:latest"
      fi
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        docker tag "${ADMIN_UI_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${ADMIN_UI_IMAGE}:${CI_COMMIT_TAG}"
        docker push "${ADMIN_UI_IMAGE}:${CI_COMMIT_TAG}"
      fi
  only:
    - main
    - develop
    - tags

# =============================================================================
# STAGE 6: DEPLOY
# =============================================================================

.deploy-template:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to ${ENVIRONMENT} environment..."
    - |
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} << 'EOF'
        set -e
        cd ${DEPLOY_PATH}
        
        # Pull latest images
        docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
        docker compose -f docker-compose.prod.yml pull
        
        # Restart services
        docker compose -f docker-compose.prod.yml up -d --no-build
        
        # Wait for health check
        sleep 10
        
        # Verify deployment
        curl -f http://localhost:8080/health || exit 1
        
        echo "Deployment complete!"
      EOF
  environment:
    name: ${ENVIRONMENT}
    url: ${DEPLOY_URL}

deploy:development:
  extends: .deploy-template
  variables:
    ENVIRONMENT: "development"
    DEPLOY_HOST: "${DEV_HOST}"
    DEPLOY_USER: "${DEV_USER}"
    DEPLOY_PATH: "${DEV_PATH}"
    DEPLOY_URL: "${DEV_URL}"
  only:
    - develop
  when: manual

deploy:staging:
  extends: .deploy-template
  variables:
    ENVIRONMENT: "staging"
    DEPLOY_HOST: "${STAGING_HOST}"
    DEPLOY_USER: "${STAGING_USER}"
    DEPLOY_PATH: "${STAGING_PATH}"
    DEPLOY_URL: "${STAGING_URL}"
  only:
    - main
  when: manual

deploy:production:
  extends: .deploy-template
  variables:
    ENVIRONMENT: "production"
    DEPLOY_HOST: "${PROD_HOST}"
    DEPLOY_USER: "${PROD_USER}"
    DEPLOY_PATH: "${PROD_PATH}"
    DEPLOY_URL: "${PROD_URL}"
  only:
    - tags
  when: manual
  environment:
    name: production
    url: ${PROD_URL}

# =============================================================================
# UTILITY JOBS
# =============================================================================

# Job to create a new release
release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: '${CI_COMMIT_TAG}'
    description: 'Release ${CI_COMMIT_TAG}'
  only:
    - tags

# Job to cleanup old Docker images
cleanup:old-images:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Cleanup job - remove old Docker images from registry"
    - echo "This should be implemented using GitLab API"
  only:
    - schedules
  when: manual
