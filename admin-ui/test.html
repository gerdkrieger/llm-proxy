<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #667eea;
            margin: 0 0 20px 0;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background: #5568d3;
        }
        #jsTest {
            margin-top: 20px;
            padding: 10px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 LLM-Proxy Test Page</h1>
        
        <div class="status success">
            ✅ HTML wird geladen
        </div>
        
        <div class="status success">
            ✅ CSS funktioniert
        </div>
        
        <div id="jsTest" class="status info">
            ⏳ JavaScript wird getestet...
        </div>
        
        <button onclick="testAPI()">Test Backend API</button>
        
        <div id="apiResult" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Test ob JavaScript funktioniert
        document.getElementById('jsTest').innerHTML = '✅ JavaScript funktioniert!';
        document.getElementById('jsTest').className = 'status success';

        // Test API
        async function testAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '⏳ Backend wird getestet...';
            
            try {
                const response = await fetch('http://localhost:8080/health');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="status success">
                        <strong>✅ Backend API läuft!</strong><br>
                        Status: ${data.status}<br>
                        Zeit: ${data.timestamp}
                    </div>
                    <p><a href="http://localhost:5173" style="color: #667eea;">👉 Zurück zum Admin UI</a></p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status" style="background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
                        <strong>❌ Backend nicht erreichbar</strong><br>
                        Fehler: ${error.message}<br>
                        <small>Starte das Backend mit: ./start-dev.sh</small>
                    </div>
                `;
            }
        }

        // Log in Console
        console.log('%c✅ Test Page geladen!', 'color: green; font-size: 20px; font-weight: bold;');
        console.log('Admin UI URL: http://localhost:5173');
        console.log('Backend URL: http://localhost:8080');
    </script>
</body>
</html>
