# =============================================================================
# LLM-PROXY CONFIGURATION EXAMPLE
# =============================================================================
# This is an example configuration file with placeholder values.
# 
# SETUP INSTRUCTIONS:
# 1. Copy this file to config.yaml:
#    cp configs/config.example.yaml configs/config.yaml
# 
# 2. Replace all placeholder values with your actual secrets:
#    - Database password
#    - JWT secret (min 32 characters)
#    - Admin API keys
#    - Client API keys
#    - LLM provider API keys (Claude, OpenAI)
# 
# 3. Never commit config.yaml to Git! (it's in .gitignore)
# 
# =============================================================================

# -----------------------------------------------------------------------------
# SERVER CONFIGURATION
# -----------------------------------------------------------------------------
server:
  host: 0.0.0.0
  port: 8080
  timeout: 300s
  read_timeout: 30s
  write_timeout: 30s
  # CORS allowed origins (adjust for your environment)
  cors_origins:
    - http://localhost:5173
    - http://localhost:3005
    - http://localhost:3000
    # Production:
    # - https://scrubgate.tech
    # - https://scrubgate.com

# -----------------------------------------------------------------------------
# DATABASE CONFIGURATION (PostgreSQL)
# -----------------------------------------------------------------------------
database:
  host: localhost
  port: 5433
  database: llm_proxy
  user: proxy_user
  password: YOUR_DATABASE_PASSWORD_HERE  # CHANGE THIS!
  max_connections: 25
  ssl_mode: disable  # Use 'require' in production

# -----------------------------------------------------------------------------
# REDIS CONFIGURATION
# -----------------------------------------------------------------------------
redis:
  host: localhost
  port: 6380
  db: 0
  password: ""  # Set if Redis requires authentication
  max_retries: 3
  pool_size: 10

# -----------------------------------------------------------------------------
# OAUTH & JWT CONFIGURATION
# -----------------------------------------------------------------------------
oauth:
  jwt_secret: "CHANGE-THIS-TO-RANDOM-STRING-MIN-32-CHARS-REQUIRED"  # CHANGE THIS!
  access_token_ttl: 2592000s  # 30 days (for static API clients like OpenWebUI)
  refresh_token_ttl: 7776000s  # 90 days
  issuer: "llm-proxy"
  
  # External OAuth providers (for future use)
  # external_providers:
  #   google:
  #     enabled: false
  #     client_id: ""
  #     client_secret: ""
  #     redirect_uri: "http://localhost:8080/oauth/providers/google/callback"

# -----------------------------------------------------------------------------
# ADMIN CONFIGURATION
# -----------------------------------------------------------------------------
admin:
  api_keys:
    - "YOUR_ADMIN_API_KEY_HERE"  # CHANGE THIS! Use a strong random key

# -----------------------------------------------------------------------------
# CLIENT API KEYS (for OpenAI-compatible clients like OpenWebUI, Cursor, etc.)
# -----------------------------------------------------------------------------
# These keys allow simple Bearer token authentication without OAuth flow
client_api_keys:
  - key: "sk-llm-proxy-YOUR-CLIENT-KEY-1"  # CHANGE THIS!
    name: "OpenWebUI"
    scopes: ["read", "write"]
    enabled: true
  - key: "sk-llm-proxy-YOUR-CLIENT-KEY-2"  # CHANGE THIS!
    name: "Cursor IDE"
    scopes: ["read", "write"]
    enabled: true

# -----------------------------------------------------------------------------
# LLM PROVIDERS CONFIGURATION
# -----------------------------------------------------------------------------
providers:
  # Anthropic Claude Configuration
  claude:
    enabled: true
    api_keys:
      # Primary API key (higher weight = more requests)
      - key: "sk-ant-YOUR-CLAUDE-API-KEY-HERE"  # CHANGE THIS!
        weight: 3      # 3x more requests than weight=1 keys
        max_rpm: 300   # Max 300 requests per minute (0 = unlimited)
      
      # Backup API key (lower weight = fewer requests)
      # - key: "sk-ant-YOUR-BACKUP-KEY-HERE"
      #   weight: 1
      #   max_rpm: 100
      
      # Add more keys for load balancing and failover
      # Note: Requests are distributed based on weight
      # Example: weight 3 + weight 1 = 75% vs 25% distribution
    
    models:
      - claude-3-5-sonnet-20241022  # Latest & Best (recommended)
      - claude-3-5-sonnet-20240620  # Previous Sonnet
      - claude-3-opus-20240229      # Most capable
      - claude-3-sonnet-20240229    # Balanced
      - claude-3-haiku-20240307     # Fast & cheap
    
    timeout: 120s
    
    retry:
      max_attempts: 3
      initial_backoff: 1s
      max_backoff: 10s
      backoff_multiplier: 2.0
  
  # OpenAI Configuration (Optional)
  openai:
    enabled: true  # Set to false to disable
    api_keys:
      - key: "sk-proj-YOUR-OPENAI-API-KEY-HERE"  # CHANGE THIS!
        weight: 1      # Equal distribution if multiple keys
        max_rpm: 500   # OpenAI Tier 1: ~500 RPM, Tier 2: ~5000 RPM
      
      # Add more keys for higher throughput
      # - key: "sk-proj-YOUR-SECOND-KEY-HERE"
      #   weight: 1
      #   max_rpm: 500
    
    # Models will be fetched dynamically from OpenAI API
    # Or you can specify them manually:
    models:
      - gpt-4-turbo-preview
      - gpt-4
      - gpt-3.5-turbo
    
    timeout: 120s
  
  # Abacus.ai Configuration (Optional)
  abacus:
    enabled: false  # Set to true to enable
    api_keys:
      - key: "YOUR-ABACUS-API-KEY-HERE"  # CHANGE THIS!
        weight: 1      # Load balancing weight
        max_rpm: 100   # Check your Abacus.ai rate limits
      
      # Add multiple deployments for redundancy
      # - key: "YOUR-SECOND-ABACUS-KEY-HERE"
      #   weight: 1
      #   max_rpm: 100
    
    # Default deployment ID (required if not specified in model name)
    deployment_id: "YOUR-DEPLOYMENT-ID-HERE"  # CHANGE THIS!
    
    # Available models (use format "abacus:deployment-id" or configure deployment_id above)
    models:
      - abacus:gpt-4
      - abacus:gpt-4-turbo
      - abacus:claude-3-opus
      - abacus:claude-3-sonnet
      - abacus:llama-3-70b
    
    timeout: 120s

# -----------------------------------------------------------------------------
# CACHE CONFIGURATION
# -----------------------------------------------------------------------------
cache:
  enabled: true
  ttl: 3600  # seconds
  max_size: 1000
  prefix: "llm-proxy:"

# -----------------------------------------------------------------------------
# RATE LIMITING
# -----------------------------------------------------------------------------
rate_limiting:
  enabled: true
  default_rpm: 1000  # requests per minute
  default_rpd: 50000  # requests per day

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  level: info  # debug, info, warn, error, fatal
  format: json  # json or console
  output: stdout

# -----------------------------------------------------------------------------
# METRICS & MONITORING
# -----------------------------------------------------------------------------
metrics:
  enabled: true
  port: 9090
  path: /metrics
