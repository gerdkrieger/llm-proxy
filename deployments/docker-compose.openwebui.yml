# =============================================================================
# LLM-PROXY + OPENWEBUI INTEGRATION - DOCKER COMPOSE
# =============================================================================
# Full stack: Backend, Admin UI, PostgreSQL, Redis, OpenWebUI, Monitoring
# Shared Docker Network for container-to-container communication
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 14 - Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: llm-proxy-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: ${DB_NAME:-llm_proxy}
      POSTGRES_USER: ${DB_USER:-proxy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_2024}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    
    ports:
      - "${DB_PORT:-5433}:5432"
    
    volumes:
      - llm-proxy-postgres-data:/var/lib/postgresql/data
      - ./deployments/docker/init-scripts:/docker-entrypoint-initdb.d:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proxy_user} -d ${DB_NAME:-llm_proxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M
    
    networks:
      - llm-proxy-network
    
    user: postgres
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 - Caching & Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: llm-proxy-redis
    restart: unless-stopped
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    ports:
      - "${REDIS_PORT:-6380}:6379"
    
    volumes:
      - llm-proxy-redis-data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M
    
    networks:
      - llm-proxy-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # LLM-Proxy Backend Application
  # ---------------------------------------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-llm-proxy-backend:latest}
    container_name: llm-proxy-backend
    restart: unless-stopped
    
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    
    env_file:
      - .env
    
    environment:
      # Override for Docker network (Viper expects DATABASE_* not DB_*)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: llm_proxy
      DATABASE_USER: proxy_user
      DATABASE_PASSWORD: ${DB_PASSWORD:-dev_password_2024}
      DATABASE_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # OAuth TTL with time units (override .env if missing units)
      OAUTH_ACCESS_TOKEN_TTL: 1h
      OAUTH_REFRESH_TOKEN_TTL: 720h
    
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "${METRICS_PORT:-9091}:9090"
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s
    
    networks:
      - llm-proxy-network
    
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Admin UI (Svelte + Nginx)
  # ---------------------------------------------------------------------------
  admin-ui:
    image: ${ADMIN_UI_IMAGE:-llm-proxy-admin-ui:latest}
    container_name: llm-proxy-admin-ui
    restart: unless-stopped
    
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    
    # NOTE: No VITE_API_BASE_URL needed!
    # The frontend uses window.location.origin at runtime
    # This means the SAME image works on localhost, staging, and production!
    
    ports:
      - "${ADMIN_UI_PORT:-3005}:80"
    
    depends_on:
      backend:
        condition: service_started
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    networks:
      - llm-proxy-network
    
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.1'
    #       memory: 128M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # NOTE: OpenWebUI runs as a separate standalone container on the host
  # It connects to LLM-Proxy backend via HTTP API on http://localhost:8080/v1
# Configure your existing OpenWebUI with:
#   OPENAI_API_BASE_URLS=http://localhost:8080/v1
#   OPENAI_API_KEYS=<your-api-key-from-env-file>
#
# IMPORTANT: Admin UI automatically detects the API URL!
#   - No configuration needed
#   - Same image works on localhost, staging, and production
#   - Uses window.location.origin at runtime
#
# NOTE: Prometheus and Grafana are currently disabled due to file mount limitations
#       with Docker socket mount strategy. Will be re-enabled in future version.
# =============================================================================

# =============================================================================
# DOCKER VOLUMES
# =============================================================================
volumes:
  llm-proxy-postgres-data:
    external: true
    name: llm-proxy-postgres-data
  llm-proxy-redis-data:
    external: true
    name: llm-proxy-redis-data

# =============================================================================
# DOCKER NETWORKS
# =============================================================================
networks:
  llm-proxy-network:
    driver: bridge
