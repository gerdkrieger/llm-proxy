# =============================================================================
# LLM-PROXY PRODUCTION DEPLOYMENT (REGISTRY-BASED)
# =============================================================================
# This compose file uses pre-built images from registries:
# - Backend & Admin-UI: GitHub Container Registry (ghcr.io)
# - Landing Page: GitLab Container Registry
# 
# NO SOURCE CODE NEEDED ON SERVER - ONLY THIS FILE + .env
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 14 - Primary Database
  # ---------------------------------------------------------------------------
  llm-proxy-postgres:
    image: postgres:14-alpine
    container_name: llm-proxy-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: ${DB_NAME:-llm_proxy}
      POSTGRES_USER: ${DB_USER:-proxy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proxy_user} -d ${DB_NAME:-llm_proxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    networks:
      - llm-proxy-network
    
    user: postgres
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 - Caching & Rate Limiting
  # ---------------------------------------------------------------------------
  llm-proxy-redis:
    image: redis:7-alpine
    container_name: llm-proxy-redis
    restart: unless-stopped
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    networks:
      - llm-proxy-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # LLM-Proxy Backend Application (FROM GITHUB REGISTRY)
  # ---------------------------------------------------------------------------
  llm-proxy-backend:
    image: ghcr.io/gerdkrieger/llm-proxy-backend:${VERSION:-latest}
    container_name: llm-proxy-backend
    restart: unless-stopped
    
    environment:
      DATABASE_HOST: llm-proxy-postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: ${DB_NAME:-llm_proxy}
      DATABASE_USER: ${DB_USER:-proxy_user}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: llm-proxy-redis
      REDIS_PORT: 6379
      ENVIRONMENT: production
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      METRICS_PORT: 9090
      OAUTH_JWT_SECRET: ${OAUTH_JWT_SECRET}
      ADMIN_API_KEYS: ${ADMIN_API_KEYS}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      RATE_LIMITING_ENABLED: ${RATE_LIMITING_ENABLED:-true}
    
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
      - "127.0.0.1:${METRICS_PORT:-9091}:9090"
    
    depends_on:
      llm-proxy-postgres:
        condition: service_healthy
      llm-proxy-redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - llm-proxy-network
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Admin UI (FROM GITHUB REGISTRY)
  # ---------------------------------------------------------------------------
  llm-proxy-admin-ui:
    image: ghcr.io/gerdkrieger/llm-proxy-admin-ui:${VERSION:-latest}
    container_name: llm-proxy-admin-ui
    restart: unless-stopped
    
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    
    ports:
      - "127.0.0.1:${ADMIN_UI_PORT:-3005}:80"
    
    depends_on:
      llm-proxy-backend:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    networks:
      - llm-proxy-network
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Landing Page (FROM GITLAB REGISTRY - ONLY!)
  # ---------------------------------------------------------------------------
  llm-proxy-landing:
    image: registry.gitlab.com/krieger-engineering/llm-proxy-landing:${VERSION:-latest}
    container_name: llm-proxy-landing
    restart: unless-stopped
    
    ports:
      - "127.0.0.1:8090:80"
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    networks:
      - llm-proxy-network
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  llm-proxy-prometheus:
    image: prom/prometheus:latest
    container_name: llm-proxy-prometheus
    restart: unless-stopped
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    
    ports:
      - "127.0.0.1:9092:9090"
    
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    networks:
      - llm-proxy-network
    
    depends_on:
      - llm-proxy-backend

  # ---------------------------------------------------------------------------
  # Grafana - Monitoring Dashboards
  # ---------------------------------------------------------------------------
  llm-proxy-grafana:
    image: grafana/grafana:latest
    container_name: llm-proxy-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3002
      - GF_INSTALL_PLUGINS=redis-datasource
    
    ports:
      - "127.0.0.1:3002:3000"
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    networks:
      - llm-proxy-network
    
    depends_on:
      - llm-proxy-prometheus

# =============================================================================
# NETWORKS - EXTERNAL TO PREVENT RECREATION
# =============================================================================
networks:
  llm-proxy-network:
    name: llm-proxy-network
    external: true

# =============================================================================
# VOLUMES - EXTERNAL TO PREVENT DATA LOSS
# =============================================================================
volumes:
  postgres_data:
    name: llm-proxy-postgres-data
    external: true
  
  redis_data:
    name: llm-proxy-redis-data
    external: true
  
  prometheus_data:
    name: llm-proxy-prometheus-data
    external: true
  
  grafana_data:
    name: llm-proxy-grafana-data
    external: true

# =============================================================================
# USAGE
# =============================================================================
# Deploy/Update:
#   export VERSION=v1.2.3  # or 'latest'
#   docker-compose -f docker-compose.registry-deploy.yml pull
#   docker-compose -f docker-compose.registry-deploy.yml up -d
#
# Rollback to previous version:
#   export VERSION=v1.2.2
#   docker-compose -f docker-compose.registry-deploy.yml pull
#   docker-compose -f docker-compose.registry-deploy.yml up -d
#
# View logs:
#   docker-compose -f docker-compose.registry-deploy.yml logs -f [service-name]
# =============================================================================
