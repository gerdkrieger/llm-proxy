version: '3.8'

# =============================================================================
# LLM-PROXY DOCKER COMPOSE - ENTERPRISE EDITION
# =============================================================================
# Services: PostgreSQL, Redis, Prometheus, Grafana
# Production-ready with health checks, resource limits, and monitoring
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 14 - Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: llm-proxy-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: ${DB_NAME:-llm_proxy}
      POSTGRES_USER: ${DB_USER:-proxy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_2024}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"  # 🔒 SECURITY: Bind to localhost only!
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proxy_user} -d ${DB_NAME:-llm_proxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    networks:
      - llm-proxy-network
    
    # Security: Run as non-root user
    user: postgres
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 - Caching & Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: llm-proxy-redis
    restart: unless-stopped
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"  # 🔒 SECURITY: Bind to localhost only!
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    networks:
      - llm-proxy-network
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-proxy-prometheus
    restart: unless-stopped
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    
    ports:
      - "127.0.0.1:9090:9090"  # 🔒 SECURITY: Prometheus (localhost only)
    
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    networks:
      - llm-proxy-network
    
    depends_on:
      - postgres
      - redis

  # ---------------------------------------------------------------------------
  # Grafana - Monitoring Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: llm-proxy-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=redis-datasource
    
    ports:
      - "127.0.0.1:3001:3000"  # 🔒 SECURITY: Grafana (localhost only)
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    networks:
      - llm-proxy-network
    
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # LLM-Proxy Application (Uncomment after building)
  # ---------------------------------------------------------------------------
  # llm-proxy:
  #   build:
  #     context: ../..
  #     dockerfile: deployments/docker/Dockerfile
  #   container_name: llm-proxy-app
  #   restart: unless-stopped
  #   
  #   env_file:
  #     - ../../.env
  #   
  #   ports:
  #     - "127.0.0.1:${SERVER_PORT:-8080}:8080"  # 🔒 SECURITY: Backend (localhost only)
  #     - "127.0.0.1:${METRICS_PORT:-9091}:9090"  # 🔒 SECURITY: Metrics (localhost only)
  #   
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   
  #   networks:
  #     - llm-proxy-network
  #   
  #   # Resource limits
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '2.0'
  #         memory: 1G
  #       reservations:
  #         cpus: '0.5'
  #         memory: 256M

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  llm-proxy-network:
    driver: bridge
    name: llm-proxy-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    name: llm-proxy-postgres-data
    driver: local
  
  redis_data:
    name: llm-proxy-redis-data
    driver: local
  
  prometheus_data:
    name: llm-proxy-prometheus-data
    driver: local
  
  grafana_data:
    name: llm-proxy-grafana-data
    driver: local

# =============================================================================
# USAGE
# =============================================================================
# Start all services:
#   docker-compose up -d
#
# Start specific service:
#   docker-compose up -d postgres redis
#
# View logs:
#   docker-compose logs -f [service-name]
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes (WARNING: deletes data):
#   docker-compose down -v
#
# Restart service:
#   docker-compose restart [service-name]
# =============================================================================
