# =============================================================================
# LLM-PROXY LOCAL DEVELOPMENT - DOCKER COMPOSE
# =============================================================================
# Full stack for local development with hot-reload
# Use: docker compose -f docker-compose.dev.yml up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 14 - Development Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    container_name: llm-proxy-postgres-dev
    restart: unless-stopped
    
    env_file:
      - .env.local
    
    environment:
      POSTGRES_DB: llm_proxy
      POSTGRES_USER: proxy_user
      POSTGRES_PASSWORD: dev_password_2024_local
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # Note: Migrations are NOT auto-loaded in dev (would cause errors on restart)
      # Run migrations manually: docker exec llm-proxy-postgres-dev psql -U proxy_user -d llm_proxy -f /migrations/XXX.sql
      # - ./migrations:/docker-entrypoint-initdb.d:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proxy_user} -d ${DB_NAME:-llm_proxy}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    networks:
      - llm-proxy-dev-network
    
    user: postgres

  # ---------------------------------------------------------------------------
  # Redis 7 - Development Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: llm-proxy-redis-dev
    restart: unless-stopped
    
    env_file:
      - .env.local
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    
    ports:
      - "${REDIS_PORT:-6380}:6379"
    
    volumes:
      - redis_dev_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    
    networks:
      - llm-proxy-dev-network

  # ---------------------------------------------------------------------------
  # LLM-Proxy Backend - Development with Hot-Reload
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend-dev
    container_name: llm-proxy-backend-dev
    restart: unless-stopped
    
    env_file:
      - .env.local
    
    environment:
      # Override for Docker network
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENVIRONMENT: development
      LOG_LEVEL: debug
    
    ports:
      - "8080:8080"   # Backend API
      - "9090:9090"   # Metrics
      - "2345:2345"   # Delve debugger (optional)
    
    volumes:
      # Mount source code for hot-reload
      - ./cmd:/app/cmd:ro
      - ./internal:/app/internal:ro
      - ./pkg:/app/pkg:ro
      - ./configs:/app/configs:ro
      - ./migrations:/app/migrations:ro
      - ./go.mod:/app/go.mod:ro
      - ./go.sum:/app/go.sum:ro
      # Go module cache (for faster rebuilds)
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - llm-proxy-dev-network

  # ---------------------------------------------------------------------------
  # Admin UI - Development with Vite Hot-Reload
  # ---------------------------------------------------------------------------
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.dev
    container_name: llm-proxy-admin-ui-dev
    restart: unless-stopped
    
    # NOTE: No VITE_API_BASE_URL needed!
    # The frontend uses window.location.origin to automatically detect the API URL
    # This means it works on any domain without configuration
    
    ports:
      - "${ADMIN_UI_PORT:-3005}:5173"  # Vite dev server
    
    volumes:
      # Mount source code for hot-reload
      - ./admin-ui/src:/app/src:ro
      - ./admin-ui/public:/app/public:ro
      - ./admin-ui/index.html:/app/index.html:ro
      - ./admin-ui/vite.config.js:/app/vite.config.js:ro
      - ./admin-ui/package.json:/app/package.json:ro
      # Exclude node_modules from bind mount (use volume instead)
      - admin_ui_node_modules:/app/node_modules
    
    depends_on:
      - backend
    
    networks:
      - llm-proxy-dev-network

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  llm-proxy-dev-network:
    driver: bridge
    name: llm-proxy-dev-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_dev_data:
    name: llm-proxy-postgres-dev-data
    driver: local
  
  redis_dev_data:
    name: llm-proxy-redis-dev-data
    driver: local
  
  go_mod_cache:
    name: llm-proxy-go-mod-cache
    driver: local
  
  go_build_cache:
    name: llm-proxy-go-build-cache
    driver: local
  
  admin_ui_node_modules:
    name: llm-proxy-admin-ui-node-modules
    driver: local

# =============================================================================
# USAGE
# =============================================================================
# Start development environment:
#   docker compose -f docker-compose.dev.yml up
#
# Start with rebuild:
#   docker compose -f docker-compose.dev.yml up --build
#
# View logs:
#   docker compose -f docker-compose.dev.yml logs -f [service-name]
#
# Stop all services:
#   docker compose -f docker-compose.dev.yml down
#
# Clean volumes (reset databases):
#   docker compose -f docker-compose.dev.yml down -v
#
# Access services:
#   Backend API:    http://localhost:8080
#   Backend Metrics: http://localhost:9090/metrics
#   Admin UI:       http://localhost:3005
#   PostgreSQL:     localhost:5433
#   Redis:          localhost:6380
#
# Hot-Reload:
#   - Backend: Air watches for Go file changes and rebuilds automatically
#   - Admin-UI: Vite dev server watches for file changes and hot-reloads
#
# Debugging:
#   - Backend: Delve debugger available on port 2345
#   - Connect with: dlv connect localhost:2345
# =============================================================================
