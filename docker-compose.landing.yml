# =============================================================================
# LLM-PROXY LANDING PAGE
# =============================================================================
# Standalone landing page for scrubgate.com
# Simple NGINX container serving static HTML
# =============================================================================

services:
  llm-proxy-landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    image: llm-proxy-landing:latest
    container_name: llm-proxy-landing
    restart: unless-stopped
    
    ports:
      - "127.0.0.1:8090:80"
    
    networks:
      - llm-proxy-network
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# NETWORK
# =============================================================================
# Uses external network to connect with other LLM-Proxy services
networks:
  llm-proxy-network:
    name: llm-proxy-network
    external: true

# =============================================================================
# USAGE
# =============================================================================
# Build and start:
#   docker compose -f docker-compose.landing.yml up -d --build
#
# View logs:
#   docker compose -f docker-compose.landing.yml logs -f
#
# Stop:
#   docker compose -f docker-compose.landing.yml down
#
# Rebuild:
#   docker compose -f docker-compose.landing.yml up -d --build --force-recreate
# =============================================================================
