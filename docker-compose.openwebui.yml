# =============================================================================
# NETWORKS
# =============================================================================
networks:
  llm-proxy-network:
    driver: bridge
    name: llm-proxy-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  llm-proxy-postgres-data:
    name: llm-proxy-postgres-data
    driver: local
  
  llm-proxy-redis-data:
    name: llm-proxy-redis-data
    driver: local
  
  # Monitoring volumes (disabled with services)
  # llm-proxy-prometheus-data:
  #   name: llm-proxy-prometheus-data
  #   driver: local
  # 
  # llm-proxy-grafana-data:
  #   name: llm-proxy-grafana-data
  #   driver: local

# =============================================================================
# USAGE
# =============================================================================
# Start all services:
#   docker compose -f docker-compose.openwebui.yml up -d
#
# Build and start:
#   docker compose -f docker-compose.openwebui.yml up -d --build
#
# View logs:
#   docker compose -f docker-compose.openwebui.yml logs -f [service-name]
#
# Stop all services:
#   docker compose -f docker-compose.openwebui.yml down
#
# Access services:
#   Backend API:    http://localhost:8080
#   Admin UI:       http://localhost:3005
#
# Configure your existing OpenWebUI to use LLM-Proxy:
#   OPENAI_API_BASE_URLS=http://localhost:8080/v1
#   OPENAI_API_KEYS=<your-api-key-from-env-file>
#
# NOTE: Prometheus and Grafana are currently disabled due to file mount limitations
#       with Docker socket mount strategy. Will be re-enabled in future version.
# =============================================================================
