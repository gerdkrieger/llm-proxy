<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Background -->
  <path d="M50 5 L85 20 L85 45 Q85 75 50 95 Q15 75 15 45 L15 20 Z" 
        fill="url(#shieldGradient)" 
        stroke="#1e40af" 
        stroke-width="2"/>
  
  <!-- Filter/Proxy Lines (3 horizontal bars with dots) -->
  <g fill="#ffffff" opacity="0.95">
    <!-- Top line -->
    <line x1="30" y1="35" x2="45" y2="35" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="35" r="3"/>
    <line x1="55" y1="35" x2="70" y2="35" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Middle line -->
    <line x1="30" y1="50" x2="40" y2="50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="3"/>
    <line x1="60" y1="50" x2="70" y2="50" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Bottom line -->
    <line x1="30" y1="65" x2="43" y2="65" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="65" r="3"/>
    <line x1="57" y1="65" x2="70" y2="65" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Subtle highlight -->
  <path d="M50 10 L75 22 L75 40 Q75 50 65 60" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        opacity="0.3"/>
</svg>
